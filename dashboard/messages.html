<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Eclipse 3.0 – Messages</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; }
    .hidden { display: none !important; }

    body {
      margin: 0;
      background: #0d0f14;
      font-family: Arial, sans-serif;
      color: white;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      position: fixed;
      top: 0; left: 0;
      width: 70px;
      height: 100vh;
      background: #11141b;
      border-right: 1px solid #222;
      padding-top: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: width 0.3s ease;
      overflow: hidden;
      z-index: 10;
    }
    .sidebar:hover { width: 230px; }
    .sidebar-logo {
      width: 48px; height: 48px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 20px;
    }
    .sidebar-title {
      color: #fff;
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 25px;
      opacity: 0;
      transition: opacity 0.25s ease;
      white-space: nowrap;
    }
    .sidebar:hover .sidebar-title { opacity: 1; }
    .sidebar-item {
      width: 100%;
      padding: 12px 0;
      color: #ccc;
      text-decoration: none;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: background 0.2s ease;
    }
    .sidebar-item.active { color: #4255ff; }
    .sidebar-item i {
      font-size: 20px;
      width: 25px;
      text-align: center;
      transition: opacity 0.2s ease;
    }
    .sidebar:hover .sidebar-item i { opacity: 0; }
    .sidebar-item:hover { background: #1a1d26; }
    .sidebar-text {
      position: absolute;
      left: 90px;
      opacity: 0;
      white-space: nowrap;
      transform: translateX(10px);
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    .sidebar:hover .sidebar-text { opacity: 1; transform: translateX(0); }

    /* Main layout */
    .main {
      margin-left: 70px;
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Conversations panel */
    .conversations-panel {
      width: 280px;
      background: #11141b;
      border-right: 1px solid #222;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .conversations-header {
      padding: 20px 16px 12px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .conversations-header h2 {
      margin: 0;
      font-size: 16px;
      font-weight: bold;
    }

    .new-dm-btn {
      background: none;
      border: none;
      color: #a0a4b8;
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
      margin-top: 0;
      transition: color 0.2s;
    }
    .new-dm-btn:hover { color: white; }

    .conversations-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .conv-item {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 2px;
    }
    .conv-item:hover { background: #1a1d26; }
    .conv-item.active { background: #4255ff22; }

    .conv-avatar-wrap {
      position: relative;
      margin-right: 12px;
      flex-shrink: 0;
    }

    .conv-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      background: #333;
    }

    .conv-status-dot {
      position: absolute;
      bottom: 1px; right: 1px;
      width: 11px; height: 11px;
      border-radius: 50%;
      border: 2px solid #11141b;
    }
    .conv-status-dot.online { background: #23a55a; }
    .conv-status-dot.offline { background: #80848e; }

    .conv-info { flex: 1; overflow: hidden; }
    .conv-name {
      font-size: 14px;
      font-weight: bold;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .conv-preview {
      font-size: 12px;
      color: #a0a4b8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .conv-unread {
      background: #4255ff;
      color: white;
      font-size: 11px;
      font-weight: bold;
      padding: 2px 6px;
      border-radius: 999px;
      margin-left: 6px;
      flex-shrink: 0;
    }

    .section-label {
      font-size: 11px;
      font-weight: bold;
      color: #a0a4b8;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 12px 12px 4px;
    }

    /* Chat area */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 12px;
      background: #0d0f14;
    }

    .chat-header-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      object-fit: cover;
    }

    .chat-header-info h3 {
      margin: 0;
      font-size: 16px;
    }

    .chat-header-info p {
      margin: 0;
      font-size: 12px;
      color: #a0a4b8;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .message-group {
      display: flex;
      flex-direction: column;
      margin-bottom: 16px;
    }

    .message-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .message-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .message-content { flex: 1; }

    .message-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 4px;
    }

    .message-sender {
      font-size: 14px;
      font-weight: bold;
    }

    .message-time {
      font-size: 11px;
      color: #a0a4b8;
    }

    .message-bubble {
      font-size: 14px;
      color: #dcddde;
      line-height: 1.5;
      padding: 2px 0;
      word-break: break-word;
    }

    .message-bubble.own {
      color: #fff;
    }

    .own-row {
      flex-direction: row-reverse;
    }

    .own-row .message-content {
      text-align: right;
    }

    .own-row .message-header {
      flex-direction: row-reverse;
    }

    /* Chat input */
    .chat-input-area {
      padding: 16px 20px;
      border-top: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 12px;
      background: #0d0f14;
    }

    .chat-input {
      flex: 1;
      padding: 12px 16px;
      background: #1a1d26;
      border: 1px solid #333;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      resize: none;
      outline: none;
      font-family: Arial, sans-serif;
      max-height: 120px;
    }

    .chat-input:focus { border-color: #4255ff; }

    .send-btn {
      padding: 12px 16px;
      background: #4255ff;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      font-size: 16px;
      margin-top: 0;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .send-btn:hover { background: #5f72ff; }

    /* Empty state */
    .no-chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #a0a4b8;
    }
    .no-chat i { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
    .no-chat p { font-size: 16px; }

    /* Profile */
    .profile-container {
      position: fixed;
      top: 20px; right: 20px;
      z-index: 20;
    }
    .profile-pic {
      width: 45px; height: 45px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid #4255ff;
    }
    .dropdown {
      position: absolute;
      top: 55px; right: 0;
      background: #11141b;
      border: 1px solid #222;
      border-radius: 8px;
      width: 220px;
      display: none;
      flex-direction: column;
      box-shadow: 0 0 15px rgba(0,0,0,0.4);
      padding: 10px 0;
    }
    .dropdown-item { padding: 10px 15px; color: #ccc; font-size: 14px; }
    .dropdown-divider { height: 1px; background: #333; margin: 8px 0; }
    .logout-btn {
      width: 100%; padding: 10px;
      background: #ff3b3b; border: none;
      color: white; font-weight: bold;
      cursor: pointer; border-radius: 6px; margin-top: 0;
    }
    .logout-btn:hover { background: #ff5555; }
  </style>
</head>

<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <img src="images/eclipse-logo.png" class="sidebar-logo" alt="Eclipse Logo">
    <div class="sidebar-title">Eclipse 3.0</div>

    <a class="sidebar-item" href="index.html">
      <i class="fa-solid fa-house"></i>
      <span class="sidebar-text">Home</span>
    </a>

    <a class="sidebar-item" href="friends.html">
      <i class="fa-solid fa-user-group"></i>
      <span class="sidebar-text">Friends</span>
    </a>

    <a class="sidebar-item active" href="messages.html">
      <i class="fa-solid fa-message"></i>
      <span class="sidebar-text">Messages</span>
    </a>

    <a class="sidebar-item hidden" id="nav-vip" href="#">
      <i class="fa-solid fa-star"></i>
      <span class="sidebar-text">VIP</span>
    </a>

    <a class="sidebar-item hidden" id="nav-addon" href="#">
      <i class="fa-solid fa-shield-halved"></i>
      <span class="sidebar-text">Admin</span>
    </a>

    <a class="sidebar-item" href="index.html">
      <i class="fa-solid fa-gear"></i>
      <span class="sidebar-text">Settings</span>
    </a>

    <a class="sidebar-item hidden" id="nav-owner" href="owner.html">
      <i class="fa-solid fa-crown"></i>
      <span class="sidebar-text">Owner Panel</span>
    </a>
  </div>

  <!-- Profile -->
  <div class="profile-container">
    <img id="profilePic" class="profile-pic" src="" alt="Profile">
    <div class="dropdown" id="dropdownMenu">
      <div class="dropdown-item" id="userName">Loading...</div>
      <div class="dropdown-item" id="userEmail" style="font-size:12px; color:#a0a4b8;"></div>
      <div class="dropdown-item">
        <span id="userRoleTag" style="font-size:11px; padding:2px 10px; border-radius:999px; display:inline-block;"></span>
      </div>
      <div class="dropdown-divider"></div>
      <button class="logout-btn" id="logoutBtn">Log Out</button>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <!-- Conversations panel -->
    <div class="conversations-panel">
      <div class="conversations-header">
        <h2>💬 Messages</h2>
        <button class="new-dm-btn" id="newDmBtn" title="New Message">
          <i class="fa-solid fa-pen-to-square"></i>
        </button>
      </div>
      <div class="conversations-list" id="conversationsList">
        <div style="color:#a0a4b8; font-size:13px; padding:12px;">Loading...</div>
      </div>
    </div>

    <!-- Chat area -->
    <div class="chat-area" id="chatArea">
      <div class="no-chat">
        <i class="fa-solid fa-message"></i>
        <p>Select a conversation to start chatting</p>
      </div>
    </div>
  </div>

  <script type="module" src="messages.js"></script>
</body>
</html>
