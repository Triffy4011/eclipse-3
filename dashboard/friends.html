<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Eclipse 3.0 – Friends</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>



    
    * { box-sizing: border-box; }
    .hidden { display: none !important; }

    body {
      margin: 0;
      background: #0d0f14;
      font-family: Arial, sans-serif;
      color: white;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      position: fixed;
      top: 0; left: 0;
      width: 70px;
      height: 100vh;
      background: #11141b;
      border-right: 1px solid #222;
      padding-top: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: width 0.3s ease;
      overflow: hidden;
      z-index: 10;
    }
    .sidebar:hover { width: 230px; }
    .sidebar-logo {
      width: 48px; height: 48px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 20px;
    }
    .sidebar-title {
      color: #fff;
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 25px;
      opacity: 0;
      transition: opacity 0.25s ease;
      white-space: nowrap;
    }
    .sidebar:hover .sidebar-title { opacity: 1; }
    .sidebar-item {
      width: 100%;
      padding: 12px 0;
      color: #ccc;
      text-decoration: none;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: background 0.2s ease;
    }
    .sidebar-item.active { color: #4255ff; }
    .sidebar-item i {
      font-size: 20px;
      width: 25px;
      text-align: center;
      transition: opacity 0.2s ease;
    }
    .sidebar:hover .sidebar-item i { opacity: 0; }
    .sidebar-item:hover { background: #1a1d26; }
    .sidebar-text {
      position: absolute;
      left: 90px;
      opacity: 0;
      white-space: nowrap;
      transform: translateX(10px);
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    .sidebar:hover .sidebar-text { opacity: 1; transform: translateX(0); }

    /* Main content */
    .main {
      margin-left: 70px;
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .header {
      padding: 20px 30px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 20px;
      background: #0d0f14;
    }

    .header h1 {
      margin: 0;
      font-size: 22px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-tabs {
      display: flex;
      gap: 5px;
    }

    .header-tab {
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      color: #a0a4b8;
      border: none;
      background: none;
      margin-top: 0;
      transition: background 0.2s;
    }

    .header-tab:hover { background: #1a1d26; color: white; }
    .header-tab.active { background: #4255ff22; color: #4255ff; }

    .add-friend-btn {
  margin-left: auto;
  padding: 8px 16px;
  background: #4255ff;
  border: none;
  border-radius: 6px;
  color: white;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 0;
  transition: background 0.2s;
}
    .add-friend-btn:hover { background: #5f72ff; }

    /* Content area */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 25px 30px;
    }

    /* Search bar */
    .search-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
    }

    .search-bar input {
      flex: 1;
      padding: 12px 16px;
      background: #1a1d26;
      border: 1px solid #333;
      border-radius: 8px;
      color: white;
      font-size: 14px;
    }

    .search-bar input:focus {
      outline: none;
      border-color: #4255ff;
    }

    .search-bar button {
      padding: 12px 20px;
      background: #4255ff;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 0;
    }

    .search-bar button:hover { background: #5f72ff; }

    /* Section title */
    .section-title {
      font-size: 12px;
      font-weight: bold;
      color: #a0a4b8;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    /* User card */
    .user-card {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      background: #1a1d26;
      border-radius: 10px;
      margin-bottom: 8px;
      transition: background 0.2s;
    }

    .user-card:hover { background: #222533; }

    .user-avatar-wrap {
      position: relative;
      margin-right: 14px;
    }

    .user-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      object-fit: cover;
      background: #333;
    }

    .status-dot {
      position: absolute;
      bottom: 1px;
      right: 1px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid #1a1d26;
    }

    .status-dot.online { background: #23a55a; }
    .status-dot.offline { background: #80848e; }

    .user-info {
      flex: 1;
    }

    .user-name {
      font-size: 15px;
      font-weight: bold;
    }

    .user-status {
      font-size: 12px;
      color: #a0a4b8;
      margin-top: 2px;
    }

    .user-actions {
      display: flex;
      gap: 8px;
    }

    .btn-accept {
      padding: 7px 14px;
      background: #23a55a22;
      color: #23a55a;
      border: 1px solid #23a55a44;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      margin-top: 0;
      transition: all 0.2s;
    }
    .btn-accept:hover { background: #23a55a; color: white; }

    .btn-decline {
      padding: 7px 14px;
      background: #ff444422;
      color: #ff6b6b;
      border: 1px solid #ff444444;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      margin-top: 0;
      transition: all 0.2s;
    }
    .btn-decline:hover { background: #ff4444; color: white; }

    .btn-message {
      padding: 7px 14px;
      background: #4255ff22;
      color: #c5cbff;
      border: 1px solid #4255ff44;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      margin-top: 0;
      transition: all 0.2s;
    }
    .btn-message:hover { background: #4255ff; color: white; }

    .btn-remove {
      padding: 7px 14px;
      background: #ff444422;
      color: #ff6b6b;
      border: 1px solid #ff444444;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      margin-top: 0;
      transition: all 0.2s;
    }
    .btn-remove:hover { background: #ff4444; color: white; }

    .btn-add {
      padding: 7px 14px;
      background: #23a55a22;
      color: #23a55a;
      border: 1px solid #23a55a44;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      margin-top: 0;
      transition: all 0.2s;
    }
    .btn-add:hover { background: #23a55a; color: white; }

    .btn-pending {
      padding: 7px 14px;
      background: #ff880022;
      color: #ffbb77;
      border: 1px solid #ff880044;
      border-radius: 6px;
      font-size: 13px;
      margin-top: 0;
      cursor: default;
    }

    .empty-state {
      text-align: center;
      color: #a0a4b8;
      padding: 40px 20px;
      font-size: 14px;
    }

    .empty-state i {
      font-size: 40px;
      margin-bottom: 15px;
      display: block;
      opacity: 0.3;
    }

    /* Profile container */
    .profile-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 20;
    }

    .profile-pic {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid #4255ff;
    }

    .dropdown {
      position: absolute;
      top: 55px;
      right: 0;
      background: #11141b;
      border: 1px solid #222;
      border-radius: 8px;
      width: 220px;
      display: none;
      flex-direction: column;
      box-shadow: 0 0 15px rgba(0,0,0,0.4);
      padding: 10px 0;
    }

    .dropdown-item {
      padding: 10px 15px;
      color: #ccc;
      font-size: 14px;
    }

    .dropdown-divider { height: 1px; background: #333; margin: 8px 0; }

    .logout-btn {
      width: 100%;
      padding: 10px;
      background: #ff3b3b;
      border: none;
      color: white;
      font-weight: bold;
      cursor: pointer;
      border-radius: 6px;
      margin-top: 0;
    }
    .logout-btn:hover { background: #ff5555; }

    /* Pending badge */
    .pending-badge {
      background: #ff4444;
      color: white;
      font-size: 10px;
      font-weight: bold;
      padding: 2px 6px;
      border-radius: 999px;
      margin-left: 6px;
    }
  </style>
</head>

<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <img src="images/eclipse-logo.png" class="sidebar-logo" alt="Eclipse Logo">
    <div class="sidebar-title">Eclipse 3.0</div>

    <a class="sidebar-item" href="index.html">
      <i class="fa-solid fa-house"></i>
      <span class="sidebar-text">Home</span>
    </a>

    <a class="sidebar-item active" href="friends.html">
      <i class="fa-solid fa-user-group"></i>
      <span class="sidebar-text">Friends</span>
    </a>

    <a class="sidebar-item" href="messages.html">
      <i class="fa-solid fa-message"></i>
      <span class="sidebar-text">Messages</span>
    </a>

    <a class="sidebar-item hidden" id="nav-vip" href="#">
      <i class="fa-solid fa-star"></i>
      <span class="sidebar-text">VIP</span>
    </a>

    <a class="sidebar-item hidden" id="nav-addon" href="#">
      <i class="fa-solid fa-shield-halved"></i>
      <span class="sidebar-text">Admin</span>
    </a>

    <a class="sidebar-item" href="index.html">
      <i class="fa-solid fa-gear"></i>
      <span class="sidebar-text">Settings</span>
    </a>

    <a class="sidebar-item hidden" id="nav-owner" href="owner.html">
      <i class="fa-solid fa-crown"></i>
      <span class="sidebar-text">Owner Panel</span>
    </a>
  </div>

  <!-- Profile -->
  <div class="profile-container">
    <img id="profilePic" class="profile-pic" src="" alt="Profile">
    <div class="dropdown" id="dropdownMenu">
      <div class="dropdown-item" id="userName">Loading...</div>
      <div class="dropdown-item" id="userEmail" style="font-size:12px; color:#a0a4b8;"></div>
      <div class="dropdown-item">
        <span id="userRoleTag" style="font-size:11px; padding:2px 10px; border-radius:999px; display:inline-block;"></span>
      </div>
      <div class="dropdown-divider"></div>
      <button class="logout-btn" id="logoutBtn">Log Out</button>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="header">
      <h1><i class="fa-solid fa-user-group"></i> Friends</h1>
      <div class="header-tabs">
        <button class="header-tab active" data-tab="all">All</button>
        <button class="header-tab" data-tab="online">Online</button>
        <button class="header-tab" data-tab="pending">Pending <span id="pendingBadge"></span></button>
      </div>
      <button class="add-friend-btn" id="addFriendBtn">
        <i class="fa-solid fa-user-plus"></i> Add Friend
      </button>
    </div>

    <div class="content" id="content">
      <div class="empty-state">
        <i class="fa-solid fa-user-group"></i>
        Loading friends...
      </div>
    </div>
  </div>

  <script type="module" src="friends.js"></script>
</body>
</html>
