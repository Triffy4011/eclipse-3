<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Eclipse 3.0 – Dashboard</title>

  <style>
    body {
      margin: 0;
      background: #0d0f14;
      font-family: Arial, sans-serif;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      transition: margin-left 0.25s ease;
    }

    /* MAIN BOX */
    .box {
      background: #11141b;
      padding: 40px;
      width: 420px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 0 25px rgba(0, 0, 0, 0.4);
    }

    .title {
      font-size: 28px;
      margin-bottom: 20px;
    }

    #userInfo {
      margin-top: 15px;
      font-size: 16px;
      color: #a0a4b8;
      white-space: pre-line;
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      background: #4255ff;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
    }

    button:hover {
      background: #5f72ff;
    }

    /* SIDEBAR */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 230px;
      height: 100vh;
      background: #11141b;
      border-right: 1px solid #222;
      padding-top: 20px;
      display: flex;
      flex-direction: column;
      transition: width 0.25s ease;
      z-index: 10;
    }

    .sidebar.collapsed {
      width: 70px;
    }

    .sidebar-title {
      color: #fff;
      font-size: 20px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 25px;
    }

    .sidebar-item {
      padding: 12px 20px;
      color: #ccc;
      text-decoration: none;
      font-size: 15px;
      display: block;
    }

    .sidebar-item:hover {
      background: #1a1d26;
    }

    .sidebar-footer {
      margin-top: auto;
      padding: 10px;
      text-align: center;
    }

    .sidebar-collapse {
      width: 100%;
      padding: 10px;
      background: #222;
      border: none;
      color: #ccc;
      cursor: pointer;
      border-radius: 6px;
    }

    .sidebar-collapse:hover {
      background: #333;
    }

    /* SHIFT MAIN CONTENT */
    body.with-sidebar .box {
      margin-left: 230px;
    }

    body.with-sidebar.collapsed .box {
      margin-left: 70px;
    }

    /* PROFILE DROPDOWN */
    .profile-container {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 20;
    }

    .profile-pic {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid #4255ff;
    }

    .dropdown {
      position: absolute;
      top: 55px;
      right: 0;
      background: #11141b;
      border: 1px solid #222;
      border-radius: 8px;
      width: 220px;
      display: none;
      flex-direction: column;
      box-shadow: 0 0 15px rgba(0,0,0,0.4);
      padding: 10px 0;
      animation: fadeIn 0.15s ease-out;
    }

    .dropdown-item {
      padding: 10px 15px;
      color: #ccc;
      font-size: 14px;
    }

    .dropdown-item:hover {
      background: #1a1d26;
    }

    .dropdown-divider {
      height: 1px;
      background: #333;
      margin: 8px 0;
    }

    .logout-btn {
      width: 100%;
      padding: 10px;
      background: #ff3b3b;
      border: none;
      color: white;
      font-weight: bold;
      cursor: pointer;
      border-radius: 6px;
    }

    .logout-btn:hover {
      background: #ff5555;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body class="with-sidebar">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-title">Eclipse 3.0</div>

    <a class="sidebar-item" href="#">Home</a>
    <a class="sidebar-item" href="#">VIP</a>
    <a class="sidebar-item" href="#">Admin</a>
    <a class="sidebar-item" href="#">Settings</a>

    <div class="sidebar-footer">
      <button class="sidebar-collapse" onclick="toggleSidebar()">⮜</button>
    </div>
  </div>

  <!-- PROFILE DROPDOWN -->
  <div class="profile-container">
    <img id="profilePic" class="profile-pic" src="" alt="Profile">
    <div class="dropdown" id="dropdownMenu">
      <div class="dropdown-item" id="userName"></div>
      <div class="dropdown-item" id="userEmail"></div>
      <div class="dropdown-divider"></div>
      <button class="logout-btn" onclick="logout()">Log Out</button>
    </div>
  </div>

  <!-- MAIN BOX -->
  <div class="box">
    <div class="title">Welcome to Eclipse 3.0</div>
    <div id="userInfo">Loading user...</div>
    <button onclick="logout()">Log Out</button>
  </div>

  <script type="module" src="dashboard.js"></script>
</body>
</html>
