<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Eclipse 3.0 – Dashboard</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      background: #0d0f14;
      font-family: Arial, sans-serif;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      transition: margin-left 0.3s ease;
    }

    .box {
      background: #11141b;
      padding: 40px;
      width: 420px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 0 25px rgba(0, 0, 0, 0.4);
      transition: margin-left 0.3s ease;
    }

    .title {
      font-size: 28px;
      margin-bottom: 20px;
    }

    #userInfo {
      margin-top: 15px;
      font-size: 16px;
      color: #a0a4b8;
      white-space: pre-line;
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      background: #4255ff;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
    }

    button:hover {
      background: #5f72ff;
    }

    /* SIDEBAR */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 70px;
      height: 100vh;
      background: #11141b;
      border-right: 1px solid #222;
      padding-top: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: width 0.3s ease;
      overflow: hidden;
      z-index: 10;
    }

    .sidebar:hover {
      width: 230px;
    }

    /* LOGO */
    .sidebar-logo {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 20px;
      transition: transform 0.3s ease;
    }

    .sidebar:hover .sidebar-logo {
      transform: scale(1.08);
    }

    /* TITLE */
    .sidebar-title {
      color: #fff;
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 25px;
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .sidebar:hover .sidebar-title {
      opacity: 1;
    }

    /* NAV ITEMS */
    .sidebar-item {
      width: 100%;
      padding: 12px 0;
      color: #ccc;
      text-decoration: none;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center; /* ICON CENTERED ALWAYS */
      position: relative;
      transition: background 0.2s ease;
    }

    .sidebar-item i {
      font-size: 20px;
      width: 25px;
      text-align: center;
    }

    .sidebar-item:hover {
      background: #1a1d26;
    }

    /* TEXT LABELS — FIXED LANE, NO OVERLAP */
    .sidebar-text {
      position: absolute;
      left: 90px; /* NORMAL SPACING (Option 1) */
      opacity: 0;
      white-space: nowrap;
      transform: translateX(10px);
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .sidebar:hover .sidebar-text {
      opacity: 1;
      transform: translateX(0);
    }

    /* SHIFT MAIN CONTENT */
    body.with-sidebar .box {
      margin-left: 90px;
    }

    .sidebar:hover ~ .box {
      margin-left: 250px;
    }

    /* PROFILE DROPDOWN */
    .profile-container {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 20;
    }

    .profile-pic {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid #4255ff;
    }

    .dropdown {
      position: absolute;
      top: 55px;
      right: 0;
      background: #11141b;
      border: 1px solid #222;
      border-radius: 8px;
      width: 220px;
      display: none;
      flex-direction: column;
      box-shadow: 0 0 15px rgba(0,0,0,0.4);
      padding: 10px 0;
      animation: fadeIn 0.15s ease-out;
    }

    .dropdown-item {
      padding: 10px 15px;
      color: #ccc;
      font-size: 14px;
    }

    .dropdown-item:hover {
      background: #1a1d26;
    }

    .dropdown-divider {
      height: 1px;
      background: #333;
      margin: 8px 0;
    }

    .logout-btn {
      width: 100%;
      padding: 10px;
      background: #ff3b3b;
      border: none;
      color: white;
      font-weight: bold;
      cursor: pointer;
      border-radius: 6px;
    }

    .logout-btn:hover {
      background: #ff5555;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body class="with-sidebar">

  <div class="sidebar">
    <img src="images/eclipse-logo.png" class="sidebar-logo" alt="Eclipse Logo">

    <div class="sidebar-title">Eclipse 3.0</div>

    <a class="sidebar-item" href="#">
      <i class="fa-solid fa-house"></i>
      <span class="sidebar-text">Home</span>
    </a>

    <a class="sidebar-item" href="#">
      <i class="fa-solid fa-star"></i>
      <span class="sidebar-text">VIP</span>
    </a>

    <a class="sidebar-item" href="#">
      <i class="fa-solid fa-shield-halved"></i>
      <span class="sidebar-text">AddOn</span>
    </a>

    <a class="sidebar-item" href="#">
      <i class="fa-solid fa-gear"></i>
      <span class="sidebar-text">Settings</span>
    </a>
  </div>

  <div class="profile-container">
    <img id="profilePic" class="profile-pic" src="" alt="Profile">
    <div class="dropdown" id="dropdownMenu">
      <div class="dropdown-item" id="userName"></div>
      <div class="dropdown-item" id="userEmail"></div>
      <div class="dropdown-divider"></div>
      <button class="logout-btn" onclick="logout()">Log Out</button>
    </div>
  </div>

  <div class="box">
    <div class="title">Welcome to Eclipse 3.0</div>
    <div id="userInfo">Loading user...</div>
    <button onclick="logout()">Log Out</button>
  </div>

  <script type="module" src="dashboard.js"></script>
</body>
</html>
