<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Eclipse 3.0 – Sign In</title>

  <style>
    body {
      margin: 0;
      background: #0d0f14;
      font-family: Arial, sans-serif;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .box {
      background: #11141b;
      padding: 40px;
      width: 360px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 0 25px rgba(0, 0, 0, 0.4);
    }

    .title {
      font-size: 28px;
      margin-bottom: 20px;
    }

    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 12px;
      background: white;
      color: #444;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
    }

    .google-btn:hover {
      background: #e8e8e8;
    }

    .google-logo {
      width: 22px;
      height: 22px;
    }

    #error {
      color: #ff4b4b;
      margin-top: 15px;
      min-height: 18px;
      font-size: 13px;
    }
  </style>
</head>

<body>
  <div class="box">
    <div class="title">Eclipse 3.0</div>

    <button class="google-btn" onclick="googleSignIn()">
      <img class="google-logo" src="https://developers.google.com/identity/images/g-logo.png">
      Sign in with Google
    </button>

    <p id="error"></p>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const client = createClient(
      "https://fjkybogixlqecziuxfui.supabase.co",
      "sb_publishable_SjaaZzJG2Q7SLPSQD3hKOg_9h-BNCk_"
    );

    window.googleSignIn = async () => {
      try {
        const { data, error } = await client.auth.signInWithOAuth({
          provider: "google",
          options: {
            redirectTo: "redirectTo: "https://real-trigger.github.io/eclipse-3/dashboard/index.html"
          }
        });

        if (error) throw error;
      } catch (err) {
        document.getElementById("error").innerText = err.message;
      }
    };
  </script>
</body>
</html>
